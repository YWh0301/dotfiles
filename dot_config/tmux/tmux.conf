# ── 终端透传 ──
set -g default-terminal "xterm-kitty"
set -g terminal-overrides "*:Tc"
set -s extended-keys on
set -as terminal-features '*:extkeys'
set -g extended-keys on
set -g extended-keys-format csi-u
set -g escape-time 10
set -g focus-events on
set -g set-clipboard on

# ── 鼠标 / 模式 ──
set -g mouse on
set -g renumber-windows on
set -g mode-keys vi

# ── 外观 ──
set -g status-left " #S "
set -g status-right " %H:%M "
set -g status-style bg=default,fg=white

# ── 前缀 C-t ──
set -g prefix C-t
unbind C-b
bind C-t send-prefix

# ── 导航 ──
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── 调整大小 ──
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# ── 分屏 ──
bind v split-window -h
bind b split-window -v

# ── 关闭 ──
bind Escape kill-pane                  # Win+Ctrl+Esc → 关窗格
bind d kill-window                    # Win+Ctrl+d   → 关窗口
set -g detach-on-destroy off
bind D kill-session
bind -n 'C-&' kill-window

# ── Session ──
bind s choose-tree -s                 # Session 选择
bind a new-window                                               # 新建窗口
bind A command-prompt -p "新 session 名:" "new-session -s '%%'"       # 新建 session 并切换
bind n next-window                    # 下一个窗口
bind m previous-window                # 上一个窗口
bind N switch-client -n               # 下一个 session
bind M switch-client -p               # 上一个 session
bind w choose-window                  # 窗口列表

# ── 粘贴 ──
bind p paste-buffer

# ── 其他 ──
bind , command-prompt -I "#W" "rename-window -- '%%'"
bind z resize-pane -Z
bind space next-layout
bind . select-layout -E
bind f command-prompt -p "搜索:" "find-window -- '%%'"
bind r source-file ~/.config/tmux/tmux.conf \; display-message "  tmux 配置已重载"
bind Bspace detach-client

# ── 复制模式 ──
bind y copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi u send-keys -X halfpage-up
bind -T copy-mode-vi d send-keys -X halfpage-down
bind -T copy-mode-vi C-u send-keys -X halfpage-up
bind -T copy-mode-vi C-d send-keys -X halfpage-down
bind -T copy-mode-vi C-j send-keys -X scroll-down
bind -T copy-mode-vi C-k send-keys -X scroll-up
unbind -T copy-mode-vi C-e
unbind -T copy-mode-vi C-y
